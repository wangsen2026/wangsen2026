<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图书商城</title>
    <link rel="stylesheet" href="lab2-2502-066-index.css">
</head>
<body>
    <div class="quanju">
        <header>
            <div class="logo">📚 图书商城</div>
            <div class="nav">
                <ul>
                    <li><a>首页</a></li>
                    <li><a>分类</a></li>
                    <li><a>新书</a></li>
                    <li><a>促销</a></li>
                    <li><a>联系</a></li>
                </ul>
            </div>
        </header>
        <div class="main">
           <div class="left">
                <h3>图书分类</h3>
                <ul>
                    <li>文学小说</li>
                    <li>人文社科</li>
                    <li>经济管理</li>
                    <li>科技科普</li>
                    <li>教育考试</li>
                    <li>儿童读物</li>
                </ul>
            </div>
            <div class="center">
                <div class="hot">
                    <h3>🔥热门推荐</h3>
                    <div class="grid">
                        <div class="item"><div class="cover"><img src="img/live.jpg" alt="活着"></div><p>活着</p><span>¥39</span></div>
                        <div class="item"><div class="cover"><img src="img/santi.jpg" alt="三体"></div><p>三体</p><span>¥68</span></div>
                        <div class="item"><div class="cover"><img src="img/bainiangudu.jpg" alt="百年孤独"></div><p>百年孤独</p><span>¥55</span></div>
                    </div>
                </div>
                <div class="new">
                    <h3>新书上市</h3>
                    <table>
                        <tr><th>书名</th><th>作者</th><th>价格</th></tr>
                        <tr><td>明朝那些事儿</td><td>当年明月</td><td>¥88</td></tr>
                        <tr><td>人类简史</td><td>尤瓦尔</td><td>¥68</td></tr>
                        <tr><td>原则</td><td>达利欧</td><td>¥98</td></tr>
                    </table>
                </div>
            </div>
            <div class="right">
                <div class="promo">
                    <h3>限时特惠</h3>
                    <div>全场5折起</div>
                    <div>满100减20</div>
                </div>
                <div class="rank">
                    <h3>本周排行</h3>
                    <div>1. 活着</div>
                    <div>2. 三体</div>
                    <div>3. 百年孤独</div>
                </div>
            </div>
        </div>
        <div class="bottom">2026图书商城</div>
    </div>

</html>
