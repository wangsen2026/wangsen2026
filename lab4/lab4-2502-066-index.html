<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图书商城</title>
    <link rel="stylesheet" href="lab4-2502-066-index.css">
</head>
<body>
    <div class="quanju">
        <header>
            <div class="logo">📚 图书商城</div>
            <div class="nav">
                <ul>
                    <li><span class="nav-item">首页</span></li>
                    <li><span class="nav-item">分类</span></li>
                    <li><span class="nav-item">新书</span></li>
                    <li><span class="nav-item">促销</span></li>
                    <li><span class="nav-item">联系</span></li>
                    <li class="icon-li"><img src="img/cart.png" alt="购物车" class="icon-img cart-icon"></li>
                    <li class="icon-li"><img src="img/search.png" alt="搜索" class="icon-img search-icon"></li>
                    <li id="user-info"><span class="nav-item">您好，访客</span></li>
                    <li><label class="nav-item login-btn" for="login-modal" id="login-btn">登录</label></li>
                    <li><span class="nav-item logout-btn" style="display: none;">退出</span></li>
                </ul>
            </div>
        </header>

        <div class="main">
           <div class="left">
                <h3>图书分类</h3>
                <ul>
                    <li>文学小说</li>
                    <li>人文社科</li>
                    <li>经济管理</li>
                    <li>科技科普</li>
                    <li>教育考试</li>
                    <li>儿童读物</li>
                </ul>
                <div class="banner">
                    <div class="carousel" id="carousel">
                        <div class="carousel-list" id="carousel-list">
                            <div class="carousel-img"><img src="img/1.webp" alt="轮播图1"></div>
                            <div class="carousel-img"><img src="img/2.webp" alt="轮播图2"></div>
                            <div class="carousel-img"><img src="img/3.webp" alt="轮播图3"></div>
                            <div class="carousel-img"><img src="img/live.jpg" alt="轮播图4"></div>
                            <div class="carousel-img"><img src="img/santi.jpg" alt="轮播图5"></div>
                            <div class="carousel-img"><img src="img/bainiangudu.jpg" alt="轮播图6"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="center">
                <div class="hot">
                    <h3>🔥热门推荐</h3>
                    <div class="grid">
                        <div class="item"><div class="cover"><img src="img/live.jpg" alt="活着"></div><p>活着</p><span>¥39</span></div>
                        <div class="item"><div class="cover"><img src="img/santi.jpg" alt="三体"></div><p>三体</p><span>¥68</span></div>
                        <div class="item"><div class="cover"><img src="img/bainiangudu.jpg" alt="百年孤独"></div><p>百年孤独</p><span>¥55</span></div>
                    </div>
                </div>
                <div class="new">
                    <h3>新书上市</h3>
                    <table>
                        <tr><th>书名</th><th>作者</th><th>价格</th></tr>
                        <tr><td>明朝那些事儿</td><td>当年明月</td><td>¥88</td></tr>
                        <tr><td>人类简史</td><td>尤瓦尔</td><td>¥68</td></tr>
                        <tr><td>原则</td><td>达利欧</td><td>¥98</td></tr>
                    </table>
                </div>
            </div>
            <div class="right">
                <div class="promo">
                    <h3>限时特惠</h3>
                    <div>全场5折起</div>
                    <div>满100减20</div>
                </div>
                <div class="rank">
                    <h3>本周排行</h3>
                    <div>1. 活着</div>
                    <div>2. 三体</div>
                    <div>3. 百年孤独</div>
                </div>
            </div>
        </div>
        <div class="bottom">2026图书商城</div>
    </div>

    <input type="checkbox" id="login-modal">
    <div class="modal">
        <label class="modal-mask" for="login-modal"></label>
        <div class="modal-content">
            <label class="close" for="login-modal">×</label>
            <div class="modal-title">用户登录</div>
            <form class="login-form" onsubmit="return login()">
                <input type="text" id="login-username" placeholder="请输入用户名">
                <input type="password" id="login-password" placeholder="请输入密码">
                <input type="submit" value="登录">
                <input type="reset" value="清除信息">
                <label class="switch-btn" for="register-modal">还没有账号？去注册</label>
                <div class="msg" id="login-msg"></div>
            </form>
        </div>
    </div>

    <input type="checkbox" id="register-modal">
    <div class="modal">
        <label class="modal-mask" for="register-modal"></label>
        <div class="modal-content">
            <label class="close" for="register-modal">×</label>
            <div class="modal-title">用户注册</div>
            <form class="register-form" onsubmit="return register()">
                <input type="text" id="reg-username" placeholder="请输入用户名">
                <input type="password" id="reg-password" placeholder="请输入密码">
                <input type="password" id="reg-repassword" placeholder="请确认密码">
                <button type="submit">注册</button>
                <label class="switch-btn" for="login-modal">已有账号？去登录</label>
                <div class="msg" id="reg-msg"></div>
            </form>
        </div>
    </div>
<script>
    window.onload = function() {
        checkLoginStatus();
        document.querySelector('.logout-btn').addEventListener('click', logout);
        startCarousel();
    };

    function checkLoginStatus() {
        var user = localStorage.getItem('currentUser');
        if (user) {
            document.getElementById('user-info').innerHTML = '<span class="nav-item">您好，' + user + '</span>';
            document.getElementById('login-btn').style.display = 'none';
            document.querySelector('.logout-btn').style.display = 'inline-block';
        }
    }

    function login() {
        var username = document.getElementById('login-username').value;
        var password = document.getElementById('login-password').value;
        var msg = document.getElementById('login-msg');
        var users = JSON.parse(localStorage.getItem('users') || '[]');
        var found = users.find(function(u) {
            return u.username === username && u.password === password;
        });
        if (found) {
            localStorage.setItem('currentUser', username);
            msg.innerHTML = '<span style="color: green;">登录成功！</span>';
            setTimeout(function() {
                document.getElementById('login-modal').checked = false;
                checkLoginStatus();
                msg.innerHTML = '';
            }, 1000);
        } else {
            msg.innerHTML = '<span style="color: red;">用户名或密码错误！</span>';
        }
        return false;
    }

    function register() {
        var username = document.getElementById('reg-username').value;
        var password = document.getElementById('reg-password').value;
        var repassword = document.getElementById('reg-repassword').value;
        var msg = document.getElementById('reg-msg');
        if (!username || !password || !repassword) {
            msg.innerHTML = '<span style="color: red;">请填写完整信息！</span>';
            return false;
        }
        if (password !== repassword) {
            msg.innerHTML = '<span style="color: red;">两次密码不一致！</span>';
            return false;
        }
        var users = JSON.parse(localStorage.getItem('users') || '[]');
        var exists = users.some(function(u) {
            return u.username === username;
        });
        if (exists) {
            msg.innerHTML = '<span style="color: red;">用户名已存在！</span>';
            return false;
        }
        users.push({username: username, password: password});
        localStorage.setItem('users', JSON.stringify(users));
        msg.innerHTML = '<span style="color: green;">注册成功！即将跳转到登录...</span>';
        setTimeout(function() {
            document.getElementById('register-modal').checked = false;
            document.getElementById('login-modal').checked = true;
            msg.innerHTML = '';
        }, 1500);
        return false;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        document.getElementById('user-info').innerHTML = '<span class="nav-item">您好，访客</span>';
        document.getElementById('login-btn').style.display = 'inline-block';
        document.querySelector('.logout-btn').style.display = 'none';
    }

    function startCarousel() {
        var list = document.getElementById('carousel-list');
        var imgs = list.querySelectorAll('.carousel-img');
        var imgHeight = 150;
        var currentIndex = 0;
        var totalImgs = imgs.length;

        function scrollUp() {
            currentIndex++;
            if (currentIndex >= totalImgs) {
                currentIndex = 0;
            }
            list.style.marginTop = '-' + (currentIndex * imgHeight) + 'px';
        }

        setInterval(scrollUp, 5000);
    }
</script>
</body>
</html>
